<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RBDS Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>

<body class="dark-bg d-flex justify-content-center align-items-center vh-100">

<div class="card bg-dark p-4 shadow-lg" style="width:350px;">

<h3 class="text-center mb-4">RBDS Login</h3>

<input type="text" id="username" class="form-control mb-3" placeholder="Username">
<input type="password" id="password" class="form-control mb-3" placeholder="Password">

<button class="btn btn-primary w-100" onclick="login()">Login</button>

<p id="errorText" class="text-danger mt-3 text-center"></p>

</div>

<script src="js/auth.js"></script>

</body>
</html>
